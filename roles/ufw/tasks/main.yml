---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow incoming SSH
  community.general.ufw:
    rule: allow
    port: "{{ ufw_ssh_port }}"
    proto: tcp

- name: Allow incoming HTTP
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp

- name: Allow incoming HTTPS
  community.general.ufw:
    rule: allow
    port: 443
    proto: tcp

- name: Deny incoming traffic
  community.general.ufw:
    policy: deny
    direction: incoming

- name: Enable ufw
  community.general.ufw:
    state: enabled
    policy: deny
