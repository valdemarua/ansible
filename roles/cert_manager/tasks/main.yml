---
- name: Add jetstack helm repo
  ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Update helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install cert-manager
  ansible.builtin.command: >
    helm upgrade --install cert-manager jetstack/cert-manager
    --namespace {{ cert_manager_namespace }}
    --create-namespace
    --version {{ cert_manager_version }}
    --set crds.enabled=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for cert-manager to be ready
  ansible.builtin.command: >
    k3s kubectl rollout status deployment/cert-manager
    -n {{ cert_manager_namespace }}
  register: cert_manager_rollout
  until: cert_manager_rollout.rc == 0
  retries: 20
  delay: 10
  changed_when: false

- name: Copy ClusterIssuer manifest
  ansible.builtin.template:
    src: cluster-issuer.yml.j2
    dest: /tmp/cluster-issuer.yml
    mode: "0644"

- name: Apply ClusterIssuer
  ansible.builtin.command: k3s kubectl apply -f /tmp/cluster-issuer.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
