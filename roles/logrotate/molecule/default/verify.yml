---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Assert logrotate is installed
      ansible.builtin.assert:
        that: "'logrotate' in ansible_facts.packages"

    - name: Read logrotate.conf
      ansible.builtin.slurp:
        src: /etc/logrotate.conf
      register: logrotate_conf

    - name: Assert logrotate.conf contains expected values
      ansible.builtin.assert:
        that:
          - "logrotate_conf['content'] | b64decode | regex_search('^weekly$', multiline=True)"
          - "logrotate_conf['content'] | b64decode | regex_search('^rotate 4$', multiline=True)"
          - "logrotate_conf['content'] | b64decode | regex_search('^compress$', multiline=True)"
