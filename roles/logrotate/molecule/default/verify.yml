---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Assert logrotate is installed
      ansible.builtin.assert:
        that: "'logrotate' in ansible_facts.packages"

    - name: Read logrotate.conf
      ansible.builtin.slurp:
        src: /etc/logrotate.conf
      register: logrotate_conf

    - name: Assert logrotate.conf contains expected values
      ansible.builtin.assert:
        that:
          - "logrotate_conf['content'] | b64decode is search('(?m)^weekly$')"
          - "logrotate_conf['content'] | b64decode is search('(?m)^rotate 4$')"
          - "logrotate_conf['content'] | b64decode is search('(?m)^compress$')"
