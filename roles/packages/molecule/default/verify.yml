---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check essential packages are installed
      ansible.builtin.command: "dpkg -s {{ item }}"
      loop:
        - tmux
        - vim
        - git
        - curl
        - wget
        - unzip
        - htop
      changed_when: false

    - name: Check git is in PATH
      ansible.builtin.command: which git
      changed_when: false
