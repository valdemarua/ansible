---
- name: Install snapd
  apt:
    name: snapd
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Install core snap
  snap:
    name: core
    state: present

- name: Refresh core snap
  command: snap refresh core
  changed_when: false

- name: Install certbot snap
  snap:
    name: certbot
    state: present
    classic: yes

- name: Symlink certbot to /usr/bin
  file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link
