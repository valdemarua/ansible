---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync && uv run ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: uv run ansible-lint

  molecule:
    name: molecule / ${{ matrix.role }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: [packages, fail2ban, logrotate]
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync && uv run ansible-galaxy collection install -r requirements.yml

      - name: Run molecule
        run: uv run molecule test
        working-directory: roles/${{ matrix.role }}
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
