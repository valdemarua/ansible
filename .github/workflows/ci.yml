---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync && uv run ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: uv run ansible-lint

  molecule:
    name: molecule / ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - packages
          - fail2ban
          - ufw
          - logrotate

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync && uv run ansible-galaxy collection install -r requirements.yml

      - name: Verify Docker is accessible
        run: docker info

      - name: Debug ansible collections
        run: |
          echo "Collections path: $(uv run ansible-galaxy collection list 2>&1 | head -5)"
          uv run ansible-galaxy collection list
        env:
          ANSIBLE_COLLECTIONS_PATH: /home/runner/.ansible/collections

      - name: Run Molecule tests
        run: uv run molecule --debug test 2>&1
        working-directory: roles/${{ matrix.role }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          DOCKER_HOST: unix:///var/run/docker.sock
          ANSIBLE_COLLECTIONS_PATH: /home/runner/.ansible/collections
